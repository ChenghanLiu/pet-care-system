server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: pet_care-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:pet_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.wineshop
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ReplaceWithA32ByteSecretKeyForDemoOnly1234
  expire-seconds: 86400
  issuer: wine-shop-system

app:
  upload:
    dir: uploads
    url-prefix: /uploads/
