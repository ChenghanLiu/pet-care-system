server:
  port: 8080

spring:
  application:
    name: pet_care-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/pet_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.wineshop
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ReplaceWithA32ByteSecretKeyForDemoOnly1234
  expire-seconds: 86400
  issuer: wine-shop-system

app:
  upload:
    dir: uploads
    url-prefix: /uploads/
